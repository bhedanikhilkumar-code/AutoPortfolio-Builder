services:
  - type: web
    name: autoportfolio-builder
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: python -m pip install --upgrade pip && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
