<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoPortfolio Builder</title>
  <style>
    :root {
      color-scheme: light;
      --bg: linear-gradient(135deg, #f3efe6 0%, #d7e4f5 50%, #f7fafc 100%);
      --card: rgba(255, 255, 255, 0.82);
      --border: rgba(17, 24, 39, 0.12);
      --text: #10233f;
      --muted: #475569;
      --accent: #0f766e;
      --accent-2: #1d4ed8;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .hero {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      align-items: end;
      margin-bottom: 28px;
    }

    .panel {
      backdrop-filter: blur(12px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
    }

    h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }

    form {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    input {
      flex: 1 1 220px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.95);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: progress;
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .wide {
      grid-column: 1 / -1;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .tag {
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(15, 118, 110, 0.08);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .project-list {
      display: grid;
      gap: 14px;
    }

    .project {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 8px;
    }

    a {
      color: var(--accent-2);
      text-decoration: none;
    }

    .stats {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .stat {
      min-width: 110px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(16, 35, 63, 0.06);
    }

    .stat strong {
      display: block;
      font-size: 1.2rem;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="panel">
        <p>GitHub profile to portfolio</p>
        <h1>Generate a portfolio draft in seconds.</h1>
        <p>Enter a GitHub username. The app fetches public profile data, selects project highlights, and renders an editable portfolio structure.</p>
      </div>
      <div class="panel">
        <h2>Build Portfolio</h2>
        <form id="builder-form">
          <input id="username" name="username" placeholder="GitHub username" autocomplete="off" required>
          <button id="submit-button" type="submit">Generate</button>
        </form>
        <div id="status" class="status"></div>
      </div>
    </section>

    <section id="portfolio" class="grid" hidden></section>
  </main>

  <script>
    const form = document.getElementById("builder-form");
    const usernameInput = document.getElementById("username");
    const submitButton = document.getElementById("submit-button");
    const statusEl = document.getElementById("status");
    const portfolioEl = document.getElementById("portfolio");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const username = usernameInput.value.trim();
      if (!username) {
        setStatus("Enter a GitHub username.");
        return;
      }

      setLoading(true);
      setStatus("Fetching GitHub profile...");

      try {
        const profileResponse = await fetch("/api/profile", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username }),
        });

        const profilePayload = await profileResponse.json();
        if (!profileResponse.ok) {
          throw new Error(profilePayload.detail || "Failed to fetch profile.");
        }

        setStatus("Generating portfolio...");

        const generateResponse = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(profilePayload),
        });

        const portfolioPayload = await generateResponse.json();
        if (!generateResponse.ok) {
          throw new Error(portfolioPayload.detail || "Failed to generate portfolio.");
        }

        renderPortfolio(profilePayload, portfolioPayload);
        setStatus("Portfolio generated.");
      } catch (error) {
        portfolioEl.hidden = true;
        portfolioEl.innerHTML = "";
        setStatus(error.message);
      } finally {
        setLoading(false);
      }
    });

    function setLoading(isLoading) {
      submitButton.disabled = isLoading;
      submitButton.textContent = isLoading ? "Working..." : "Generate";
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function renderPortfolio(profileData, portfolioData) {
      const { profile } = profileData;
      portfolioEl.hidden = false;
      portfolioEl.innerHTML = `
        <section class="panel wide">
          <p>${portfolioData.hero.title}</p>
          <h2>${escapeHtml(portfolioData.hero.content.headline)}</h2>
          <p>${escapeHtml(portfolioData.hero.content.subheadline)}</p>
          <div class="stats">
            ${renderStat("Repos", portfolioData.hero.content.stats.public_repos)}
            ${renderStat("Followers", portfolioData.hero.content.stats.followers)}
            ${renderStat("Following", portfolioData.hero.content.stats.following)}
          </div>
        </section>
        <section class="panel">
          <p>${portfolioData.about.title}</p>
          <h2>${escapeHtml(portfolioData.about.content.name)}</h2>
          <ul>${portfolioData.about.content.summary.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
        </section>
        <section class="panel">
          <p>${portfolioData.skills.title}</p>
          <h2>Highlighted Skills</h2>
          <div class="tags">${portfolioData.skills.content.highlighted.map(renderTag).join("") || "<span class='tag'>No detected skills yet</span>"}</div>
        </section>
        <section class="panel wide">
          <p>${portfolioData.projects.title}</p>
          <h2>Featured Work</h2>
          <div class="project-list">
            ${portfolioData.projects.content.items.map((project) => `
              <article class="project">
                <div class="project-header">
                  <strong>${escapeHtml(project.name)}</strong>
                  <a href="${project.url}" target="_blank" rel="noreferrer">Repository</a>
                </div>
                <p>${escapeHtml(project.description)}</p>
                <div class="tags">
                  ${project.language ? renderTag(project.language) : ""}
                  ${project.topics.map(renderTag).join("")}
                </div>
              </article>
            `).join("") || "<p>No repositories available.</p>"}
          </div>
        </section>
        <section class="panel wide">
          <p>${portfolioData.contact.title}</p>
          <h2>Contact</h2>
          <p><a href="${profile.html_url}" target="_blank" rel="noreferrer">${escapeHtml(profile.html_url)}</a></p>
          ${portfolioData.contact.content.blog ? `<p><a href="${profile.blog}" target="_blank" rel="noreferrer">${escapeHtml(profile.blog)}</a></p>` : ""}
          ${portfolioData.contact.content.email ? `<p>${escapeHtml(portfolioData.contact.content.email)}</p>` : ""}
          ${portfolioData.contact.content.location ? `<p>${escapeHtml(portfolioData.contact.content.location)}</p>` : ""}
        </section>
      `;
    }

    function renderStat(label, value) {
      return `<div class="stat"><strong>${escapeHtml(String(value))}</strong><span>${escapeHtml(label)}</span></div>`;
    }

    function renderTag(value) {
      return `<span class="tag">${escapeHtml(value)}</span>`;
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
