<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoPortfolio Builder</title>
  <meta name="description" content="Generate a premium developer portfolio from your GitHub profile. Edit, export, and share instantly.">
  <meta name="theme-color" content="#020617">
  <meta property="og:title" content="AutoPortfolio Builder">
  <meta property="og:description" content="Generate, edit, and export a modern developer portfolio in seconds.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <canvas id="warp-canvas" class="warp-canvas" aria-hidden="true"></canvas>
  <div class="bg-overlay" aria-hidden="true"></div>

  <main class="page">
    <section class="hero">
      <div class="panel glass-card reveal" data-reveal="up">
        <p class="hero-eyebrow">GitHub profile to portfolio</p>
        <h1>Generate <span class="grad-text">cinematic</span> portfolio pages in seconds.</h1>
        <p id="hero-rotator" class="hero-rotator">AI Portfolio. Auto-built. Always fresh.</p>
      </div>
      <div class="panel glass-card reveal" data-reveal="up">
        <h2>Build Portfolio</h2>
        <form id="builder-form">
          <input id="username" name="username" placeholder="GitHub username" autocomplete="off" required>
          <select id="theme" name="theme" aria-label="Portfolio theme">
            <option value="modern">Modern</option>
            <option value="minimal">Minimal</option>
          </select>
          <button id="submit-button" class="btn-primary magnetic" type="submit">Generate</button>
        </form>
        <div id="status" class="status"></div>
        <div id="error-banner" class="error-banner" hidden></div>
      </div>
    </section>

    <section id="portfolio" hidden></section>
  </main>

  <a class="floating-cta magnetic" href="#builder-form">⚡ Build Now</a>

  <script src="/static/script.js" defer></script>
</body>
</html>
