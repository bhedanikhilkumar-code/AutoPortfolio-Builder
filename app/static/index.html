<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoPortfolio Builder</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <canvas id="warp-canvas" class="warp-canvas" aria-hidden="true"></canvas>
  <div class="bg-overlay" aria-hidden="true"></div>

  <main class="page">
    <section class="hero">
      <div class="panel glass-card">
        <p>GitHub profile to portfolio</p>
        <h1>Generate, edit, and export a portfolio draft.</h1>
        <p>Enter a GitHub username. The app fetches public profile data, builds a portfolio draft, lets you revise the content, then exports or shares the saved version as HTML, ZIP, or PDF.</p>
      </div>
      <div class="panel glass-card">
        <h2>Build Portfolio</h2>
        <form id="builder-form">
          <input id="username" name="username" placeholder="GitHub username" autocomplete="off" required>
          <select id="theme" name="theme" aria-label="Portfolio theme">
            <option value="modern">Modern</option>
            <option value="minimal">Minimal</option>
          </select>
          <button id="submit-button" class="btn-primary" type="submit">Generate</button>
        </form>
        <div id="status" class="status"></div>
        <div id="error-banner" class="error-banner" hidden></div>
      </div>
    </section>

    <section id="portfolio" hidden></section>
  </main>

  <script src="/static/script.js" defer></script>
</body>
</html>
